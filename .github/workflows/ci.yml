name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test (stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Full workspace suite: unit tests, integration tests, and doctests.
      # `--skip ui` excludes the trybuild snapshot test (`fn ui` in tests/trybuild.rs
      # is the only `#[test]` named `ui` in the workspace) so channel-sensitive
      # .stderr drift can never fail this required step; trybuild runs separately below.
      - name: cargo test (skip trybuild snapshots)
        run: cargo test --workspace -- --skip ui
      # The trybuild UI .stderr snapshots are blessed on stable rustc and are
      # channel/version-sensitive. A future rustc release can legitimately drift them,
      # which is expected occasionally, so this step is allowed to fail without failing
      # the job. To re-bless the snapshots: TRYBUILD=overwrite cargo test --test trybuild
      - name: cargo test --test trybuild (UI snapshots, may drift)
        run: cargo test --test trybuild
        continue-on-error: true

  msrv:
    name: build (1.71.0 MSRV)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.71.0
      - uses: Swatinem/rust-cache@v2
      # The declared MSRV (rust-version = 1.71) covers *building the published library*, not
      # the test suite: the dev-dependency `trybuild` requires rustc 1.76+, so `cargo test`
      # cannot run on the 1.71 floor. Cargo.lock is gitignored, so this resolves fresh with
      # 1.71's cargo — the 1.71 floor is set by the latest release of the core proc-macro deps
      # (syn 2.0, quote, unicode-ident all declare rust-version 1.71). If one of those bumps
      # its own MSRV above 1.71 in a future release, this job will flag it and the floor here
      # (and in the three `rust-version` fields) must move with it.
      #
      # Build both feature configurations: the default (type-leak, backed by safegraph) and
      # the `default-features = false` finalize-only bridge that downstream wrappers (e.g.
      # syan's `#[recurse]`) depend on — the latter is the whole reason the floor is this low.
      - name: cargo build (default features — decycle + macro + impl)
        run: cargo build -p decycle -p decycle-macro -p decycle-impl
      - name: cargo build (decycle-impl, no default features)
        run: cargo build -p decycle-impl --no-default-features

  clippy:
    name: clippy (stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  doc:
    name: doc (stable)
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --no-deps
